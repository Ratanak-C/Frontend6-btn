<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Excercise btn</title>
</head>
<style>
    h1 {
        font-family: sans-serif;
        font-size: 32px;
    }

    /* Primary 1 */
    .p1f {
        border:solid  blue;
        border-radius: 10px;
        padding: 10px 20px;
        background-color: blue;
        color: white;
        margin: 20px;
        cursor: pointer;
        transition: all 600ms;
    }
.p1f:hover{
    background-color: darkblue;
}
    .p1s {
        padding: 10px 20px;
        border:1px solid black;
        border-radius: 7px;
        background-color: black;
        color: white;
        margin: 20px;
        cursor: pointer;
        transition: all 600ms;
    }
.p1s:hover{
    background-color: gray;
    }

    .p1t {
        padding: 10px 20px;
        border:1px solid black;
        border-radius: 20px;
        margin: 20px;
        background-color: transparent;
        cursor: pointer;
        transition: all 600ms;
    }
.p1t:hover{
    background-color: bisque;
   
}
    /* Primary2 */
    .p2f {
        padding: 10px 30px;
        border:1px solid black;
        border-radius: 10px;
        color: white;
        background-color:forestgreen;
        margin: 20px;
        cursor: pointer;
        transition: all 600ms;
    }
.p2f:hover{
    background-color: aquamarine;
}
    .p2s {
        padding: 10px 20px;
        border:1px solid black;
        color: white;
        background-color: gray;
        margin: 20px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 600ms;
        
    }
.p2s:hover{
    background-color: black;
  
}
    .p2t {
        margin: 20px;
        border:solid pink;
        padding: 20px 30px;
        border-radius: 50px;
        color: pink;
        font-size: 18px;
        background-color: transparent;
        transition: all 600ms;
    }
    .p2t:hover{
        background-color: hotpink;
    }

    /* Primary 3 */
    .p3f {
        border:solid  black;
        padding: 30px 50px;
        border-radius: 10px;
        background-color: cyan;
        color: white;
        margin: 20px;
        cursor: pointer;
        transition: all 600ms;
    }
.p3f:hover{
    background-color: indigo;
      transform: scale(1.2);
      
}
    .p3s {
        border:solid black;
        color: white;
        padding: 30px 40px;
        border-radius: 10px;
        background-color: black;
        margin: 20px;
        cursor: pointer;
        transition: all 600ms;

    }
.p3s:hover{
    background-color: azure;
    transform: rotate(90deg);
    color: black;
}
    .p3t {
        border: 1px solid black;
        color: white;
        padding: 30px 50px;
        background-color: brown;
        border-radius: 20px;
        cursor: pointer;
        transition: all 600ms;
    }
    .p3t:hover{
        background-color: red;
        transform: scale(0.8);
    }
</style>

<body>
    <div>
        <h1>Primary</h1>
        <br>
        <button class="p1f">Primary Button</button>
        <button class="p1s">Primary btn</button>
        <button class="p1t">Primary btn</button>
    </div>
    <br>
    <div>
        <h1>Primary</h1>
        <br>
        <button class="p2f">Primary btn</button>
        <button class="p2s">Primary btn</button>
        <button class="p2t">Primary btn</button>
    </div>
    <br>
    <div>
        <h1>Primary</h1>
        <button class="p3f">Primary btn</button>
        <button class="p3s">Primary btn</button>
        <button class="p3t">Primary btn</button>
    </div>
</body>

</html>
